# Render Deployment Configuration for WebShield Scanner

services:
  # Backend API Service
  - type: web
    name: webshield-scanner-api
    runtime: python
    repo: https://github.com/yourusername/webshield-scanner
    plan: starter
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: webshield-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: webshield-redis
          type: redis
          property: connectionString
      - key: RATELIMIT_STORAGE_URI
        fromService:
          name: webshield-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: ADMOB_APP_ID
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        value: https://your-app-domain.com
      - key: RATELIMIT_ENABLED
        value: True
    buildCommand: |
      pip install -r requirements.txt
      playwright install
      playwright install-deps
    startCommand: gunicorn -c gunicorn.conf.py backend.wsgi:app
    healthCheckPath: /api/health
    autoDeploy: true
    scaling:
      minInstances: 1
      maxInstances: 3
      targetMemoryPercent: 80
      targetCPUPercent: 80

  # Background Worker (Celery)
  - type: worker
    name: webshield-scanner-worker
    runtime: python
    repo: https://github.com/yourusername/webshield-scanner
    plan: starter
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: webshield-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: webshield-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        sync: false
    buildCommand: |
      pip install -r requirements.txt
      playwright install
      playwright install-deps
    startCommand: celery -A backend.celery_worker worker --loglevel=info --concurrency=4
    autoDeploy: true

  # Redis Cache
  - type: redis
    name: webshield-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru

# Database
databases:
  - name: webshield-db
    plan: starter
    databaseName: webshield_db
    user: webshield_user
    ipAllowList: []

# Preview Environments
preview:
  - name: webshield-scanner-staging
    plan: starter
    envVars:
      - key: FLASK_ENV
        value: staging
      - key: LOG_LEVEL
        value: DEBUG
    autoDeploy: false
